<meta name="keywords" content="두근두근 인연 연구소, 이름 궁합, 사랑 궁합, 커플 테스트, 인연 테스트">

<title>💖 두근두근 인연 연구소 💖</title>

<meta name="google-site-verification" content="PKPdaGZXPA33EehDqrMQ-axm-voXCeAhs3IB2kxXOjg" />

<style>
/* ===== 너 기존 CSS 그대로 넣으면 됨 ===== */
body{
    font-family: "Malgun Gothic", sans-serif;
    background: linear-gradient(135deg,#ff9ad5,#d8a8ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
    padding: 10px;
    box-sizing: border-box;
}

.container{
    background:white;
    width:90%;
    max-width:500px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h1{ color:#ff4fa3; font-size: 26px; }

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:2px solid #ffc1e3;
    border-radius:10px;
}

button{
    background:#ff4fa3;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{ background:#e03b8b; }

#result{ margin-top:25px; }

.card{
    background:#fff5fb;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>💖 두근두근 인연 연구소 💖</h1>

<input id="name1" placeholder="이름 입력">
<input id="name2" placeholder="이름 입력">

<button onclick="calculateLove()">궁합 분석하기</button>

<div id="result"></div>

</div>

<script>
// ===== 고정 커플 =====
const fixedCouples = {
    "장예영|정해성":98,
    "이수아|김서환":95,
    "김세빈|김우솔":93,
    "인예인|이우석":91
};

function makeKey(a,b){
    return [a,b].sort().join("|");
}

function getLoveScore(name1,name2){
    const key = makeKey(name1,name2);
    let score = fixedCouples[key];

    if(score === undefined){
        let sum = 0;
        for(let i=0;i<key.length;i++){
            sum += key.charCodeAt(i);
        }
        score = (sum * 7) % 101;
    }

    return score;
}

function calculateLove(){
    const n1 = document.getElementById("name1").value.trim();
    const n2 = document.getElementById("name2").value.trim();

    if(!n1 || !n2){
        alert("이름을 입력해주세요!");
        return;
    }

    const score = getLoveScore(n1,n2);

    document.getElementById("result").innerHTML =
    `<div class="card">
        <h2>${n1} ❤️ ${n2}</h2>
        <h1>${score}%</h1>
    </div>`;
}
</script>

</body>
</html>
